<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO-DO-LIST</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="body">
      <div class="header">
        <h1 class="heading">MY TO-DO-LIST</h1>
      </div>
      <div class="main-body">
        <div class="header-input">
          <input
            type="text"
            class="input"
            id="input"
            placeholder="Enter to-do-activity"
          />
          <button class="add">Add</button>
        </div>
        <div class="todo-lists">
          <div class="to-do">
            <input
              type="checkbox"
              class="checked"
              id="checked"
              placeholder="
            "
            />
            <p class="activity">Walk the dog</p>
            <button class="deleteBtn" id="deleteBtn">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
          
          <div class="to-do">
            <input
              type="checkbox"
              class="checked"
              id="checked"
              placeholder="
            "
            />
            <p class="activity">Walk the dog</p>
            <button class="deleteBtn" id="deleteBtn">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
